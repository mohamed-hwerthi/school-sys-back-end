name: Backend CI

on:
  push:
    paths: ['school-system-back/**']
  pull_request:
    paths: ['school-system-back/**']

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: school-system-back
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - run: mvn test -B
