name: Frontend CI

on:
  push:
    paths: ['school-system-front/**']
  pull_request:
    paths: ['school-system-front/**']

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: school-system-front
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: school-system-front/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
      - run: npm run test -- --run
