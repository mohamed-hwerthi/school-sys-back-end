spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/school_dev_db
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:med}
    password: ${DB_PASSWORD:med}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: public
    baseline-on-migrate: true

logging:
  level:
    root: INFO
    com.schoolSys.schooolSys: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.flywaydb: DEBUG

server:
  error:
    include-stacktrace: always

# CORS — wide open for local development
app:
  cors:
    allowed-origins: "*"

# Actuator — expose everything in dev
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
