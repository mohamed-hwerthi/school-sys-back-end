spring:
  # DevTools : on désactive l'auto-restart qui corrompt le ClassLoader
  # lors d'éditions multi-fichiers (NoClassDefFoundError observé sur
  # TenantContext / ModuleClasseVolume après modifications en cascade).
  devtools:
    restart:
      enabled: false

  datasource:
    url: jdbc:postgresql://localhost:5432/school_dev_db
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:med}
    password: ${DB_PASSWORD:med}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5432/school_dev_db
    user: ${DB_USERNAME:med}
    password: ${DB_PASSWORD:med}
    locations: classpath:db/migration
    schemas: public
    baseline-on-migrate: true

  mail:
    enabled: false
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

logging:
  file:
    name: logs/backend.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n%ex"
  logback:
    rollingpolicy:
      file-name-pattern: logs/backend-%d{yyyy-MM-dd}.%i.log
      max-file-size: 50MB
      max-history: 14
      total-size-cap: 1GB
      clean-history-on-start: false
  level:
    root: INFO
    com.schoolSys.schooolSys: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.flywaydb: DEBUG

server:
  port: ${SERVER_PORT:8080}
  error:
    include-stacktrace: always

# JWT — dev-only default secret (DO NOT use in production)
app:
  jwt:
    secret: ${JWT_SECRET:aVeryLongSecretKeyThatIsAtLeast256BitsForHS256Algorithm2026!}
  cors:
    allowed-origins: "*"

# Actuator — expose everything in dev
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
