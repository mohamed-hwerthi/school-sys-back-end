spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:school_db}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate: {}

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: public
    baseline-on-migrate: false

logging:
  level:
    root: WARN
    com.schoolSys.schooolSys: INFO
    org.flywaydb: INFO

server:
  error:
    include-stacktrace: never

# CORS — restrict to your actual frontend domain
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://your-domain.com}

# Swagger — disable in prod
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
