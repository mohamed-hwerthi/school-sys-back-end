spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/school_dev_db
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:med}
    password: ${DB_PASSWORD:med}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5432/school_dev_db
    user: ${DB_USERNAME:med}
    password: ${DB_PASSWORD:med}
    locations: classpath:db/migration
    schemas: public
    baseline-on-migrate: true

  mail:
    enabled: false
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

logging:
  level:
    root: INFO
    com.schoolSys.schooolSys: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.flywaydb: DEBUG

server:
  error:
    include-stacktrace: always

# JWT — dev-only default secret (DO NOT use in production)
app:
  jwt:
    secret: ${JWT_SECRET:aVeryLongSecretKeyThatIsAtLeast256BitsForHS256Algorithm2026!}
  cors:
    allowed-origins: "*"

# Actuator — expose everything in dev
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
