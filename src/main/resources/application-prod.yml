spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:school_db}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:lingua123456}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate: {}

  flyway:
    enabled: true
    # PROD: schema migrations only. NEVER add db/seed here — it would
    # insert demo users/tenants into production.
    locations: classpath:db/migration
    schemas: public
    baseline-on-migrate: false

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: WARN
    com.schoolSys.schooolSys: INFO
    org.flywaydb: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.web: DEBUG



# CORS — restrict to your actual frontend domain
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://schooly.learnup.tn,http://localhost:5000}
  tenant:
    # PROD: schema migrations only — no demo/seed data in tenant schemas
    flyway-locations: classpath:db/tenant-migration

# Swagger — disable in prod
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
