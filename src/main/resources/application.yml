      max-file-size: 10MB
      max-request-size: 50MB
  mail:
    enabled: ${MAIL_ENABLED:true}
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:learnupadmin@gmail.com}
    password: ${SMTP_PASSWORD:bsjhuacvumanybys}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
    from: ${MAIL_FROM:learnupadmin@gmail.com}

