spring:
  application:
    name: school-system
  profiles:
    active: dev
  jpa:
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  mail:
    enabled: ${MAIL_ENABLED:false}
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
    from: ${MAIL_FROM:noreply@ecolenet.dev}

server:
  port: 8083

# JWT
app:
  upload-dir: uploads/
  jwt:
    secret: ${JWT_SECRET:}
    access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  ai:
    enabled: ${AI_ENABLED:false}
    provider: ${AI_PROVIDER:anthropic}
    api-key: ${AI_API_KEY:}
    model: ${AI_MODEL:claude-sonnet-4-20250514}
    max-tokens: ${AI_MAX_TOKENS:1024}
  storage:
    type: ${STORAGE_TYPE:local}
    local-path: ${STORAGE_LOCAL_PATH:./uploads}
    s3-bucket: ${STORAGE_S3_BUCKET:}
    s3-region: ${STORAGE_S3_REGION:}
    s3-endpoint: ${STORAGE_S3_ENDPOINT:}
    s3-access-key: ${STORAGE_S3_ACCESS_KEY:}
    s3-secret-key: ${STORAGE_S3_SECRET_KEY:}
    max-file-size: ${STORAGE_MAX_FILE_SIZE:10485760}
    allowed-extensions:
      - pdf
      - jpg
      - jpeg
      - png
      - gif
      - doc
      - docx
      - xls
      - xlsx
      - mp4
      - mp3

# Twilio SMS
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  from-number: ${TWILIO_FROM_NUMBER:}

# Springdoc / Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
